name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - name: Build cross-platform binaries
        run: |
          mkdir -p dist
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              ext=""
              [ "$os" = "windows" ] && ext=".exe"
              name="tce_${os}_${arch}${ext}"
              echo "Building $name..."
              GOOS=$os GOARCH=$arch go build -o "dist/$name" -ldflags="-s -w -X main.version=${GITHUB_REF_NAME#v}" .
            done
          done

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
