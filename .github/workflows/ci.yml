name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          check-latest: true

      - run: go build ./...
        name: Build

      - run: go vet ./...
        name: Vet

      - uses: golangci/golangci-lint-action@v6
        name: Lint
        with:
          version: latest

      - run: go test ./... -count=1
        name: Test
